<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Link indisponivel | Agencia O Socio</title>
  <style>
    :root {
      --bg: #070707;
      --panel: #101010;
      --line: #252525;
      --text: #f5f5f5;
      --muted: #9b9b9b;
      --yellow: #ffd600;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(255, 214, 0, .08), transparent 30%),
        linear-gradient(180deg, #0b0b0b, var(--bg));
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    main {
      width: min(560px, calc(100% - 32px));
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(16, 16, 16, .92);
      padding: 34px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, .36);
    }

    .mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--yellow);
      color: #070707;
      font-weight: 900;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 7vw, 44px);
      line-height: 1;
      letter-spacing: -.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">OS</div>
    <h1>Link indisponivel</h1>
    <p>Confira se o endereco recebido esta completo. Os materiais sao acessados apenas pelo link direto enviado pela Agencia O Socio.</p>
  </main>
</body>
</html>
